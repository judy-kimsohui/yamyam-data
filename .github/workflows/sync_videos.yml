name: Sync new videos to S3 & DB

on:
  push:
    branches: [main]
    paths:
      - '**.mp4'
  workflow_dispatch:  # 수동 실행 허용

jobs:
  sync-videos:
    runs-on: ubuntu-latest

    steps:
      - name: Run sync script on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 300s
          script: |
            set -e
            # yamyam-data 최신 스크립트 pull
            if [ -d ~/yamyam-data ]; then
              git -C ~/yamyam-data pull origin main -q
            else
              git clone https://github.com/judy-kimsohui/yamyam-data.git ~/yamyam-data -q
            fi
            python3 -c "import boto3" 2>/dev/null || pip3 install boto3 -q
            GITHUB_TOKEN="${{ secrets.YAMYAM_PAT }}" python3 ~/yamyam-data/scripts/sync_github_to_s3.py
